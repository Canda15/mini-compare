name: Build Windows Release (AVX2)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Tauri on Windows
    runs-on: windows-latest

    env:
      RUSTFLAGS: "-C target-cpu=x86-64-v3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          # 【关键修改 1】：升级到 pnpm 9，完美修复对原生可选包 (Optional Dependencies) 的解析 Bug
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 【关键修改 2】：推荐将 Node.js 升级到 20 (LTS)，Vite 6 和 Tailwind v4 对 Node 20 的原生模块支持更好
          node-version: 20
          # 注意：这里我们去掉了 cache: 'pnpm'，是为了防止 GitHub 恢复上次那个损坏的缓存

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install frontend dependencies
        # 【关键修改 3】：加入 --force 强制重新拉取所有依赖，确保一定会下载 Windows 版的 tailwindcss-oxide
        run: pnpm install --no-frozen-lockfile --force

      - name: 🛠️ Fix Tauri Version Mismatch (Auto Sync)
        run: |
          cd src-tauri
          cargo update

      - name: Build Tauri App (No Installer)
        run: pnpm tauri build --no-bundle

      - name: Package as ZIP
        run: |
          New-Item -ItemType Directory -Force -Path release-zip
          
          # 根据报错日志，你的主程序名称就是 mini-compare.exe
          Copy-Item src-tauri\target\release\mini-compare.exe -Destination release-zip\
          
          Compress-Archive -Path release-zip\* -DestinationPath mini-compare-windows-avx2.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-compare-windows-avx2
          path: mini-compare-windows-avx2.zip
          retention-days: 7
