name: Build Windows Release (AVX2)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Tauri on Windows
    runs-on: windows-latest

    env:
      # 开启 AVX2 及相关现代指令集优化
      RUSTFLAGS: "-C target-cpu=x86-64-v3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm' 

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install frontend dependencies
        # 安装前端依赖（允许根据 package.json 自动匹配，不强校验锁文件）
        run: pnpm install --no-frozen-lockfile

      - name: 🛠️ Fix Tauri Version Mismatch (Auto Sync)
        # 关键修复步：动态让 Rust 后端依赖升级对齐前端版本，绕过 Tauri 的拦截！
        run: |
          cd src-tauri
          cargo update

      - name: Build Tauri App (No Installer)
        run: pnpm tauri build --no-bundle

      - name: Package as ZIP
        run: |
          New-Item -ItemType Directory -Force -Path release-zip
          
          # 将编译出的 exe 放入待压缩目录
          Copy-Item src-tauri\target\release\mini-compare.exe -Destination release-zip\
          
          # 打包为 zip
          Compress-Archive -Path release-zip\* -DestinationPath mini-compare-windows-avx2.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-compare-windows-avx2
          path: mini-compare-windows-avx2.zip
          retention-days: 7
